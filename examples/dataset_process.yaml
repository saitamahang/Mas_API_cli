# 数据集处理配置示例
# 使用方式: pangu dataset process <dataset_id> -f examples/dataset_process.yaml [--wait]
#
# 可用算子列表: pangu dataset operators

operators:
  - operator_name: text_clean       # 文本清洗
    params:
      remove_html: true
      remove_special_chars: true
      min_length: 10
      max_length: 2048

  # 可叠加多个算子，按顺序执行
